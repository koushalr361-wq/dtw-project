<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
<button onclick="toggleTheme()">🌗</button>
</head>
<body>

<header>
    <h2>📚 Book Exchange</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">
            <h3 id="totalBooks">0</h3>
            <p>Total Books</p>
        </div>
        <div class="stat-box">
            <h3 id="likedBooks">0</h3>
            <p>Wishlist ❤️</p>
        </div>
        <div class="stat-box">
            <h3 id="topCategory">-</h3>
            <p>Top Category</p>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
        <button onclick="filterBooks('All')">All</button>
        <button onclick="filterBooks('Self Help')">Self Help</button>
        <button onclick="filterBooks('Finance')">Finance</button>
        <button onclick="filterBooks('Fiction')">Fiction</button>
    </div>

    <!-- ADD -->
    <div class="top-bar">
        <input type="text" id="bookName" placeholder="Book name">
        <input type="text" id="bookImg" placeholder="Image URL">
        <select id="category">
            <option>Self Help</option>
            <option>Finance</option>
            <option>Fiction</option>
        </select>
        <button onclick="addBook()">Add</button>
    </div>

    <!-- LIST -->
    <div id="bookList" class="grid"></div>

    <!-- TRENDING -->
    <h3>🔥 Trending</h3>
    <div id="trendingList" class="grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
